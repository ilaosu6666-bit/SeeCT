<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智影溯源 - AI肺结节教学平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0E1117;--bg2:#1A1C23;--text:#E0E0E0;--accent:#00CED1;
  --red:#FF6B6B;--green:#4ECDC4;--orange:#FFA500;--radius:8px;
}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}

/* 侧边栏 */
#sidebar{width:260px;background:var(--bg2);padding:16px;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
#sidebar h1{font-size:20px;text-align:center;color:var(--accent)}
#sidebar .stage{font-size:14px;color:#999}
#sidebar progress{width:100%;height:8px;border-radius:4px}
#sidebar progress::-webkit-progress-bar{background:#333;border-radius:4px}
#sidebar progress::-webkit-progress-value{background:var(--accent);border-radius:4px}
#sidebar .metric{padding:8px;background:#0E1117;border-radius:var(--radius)}
#sidebar .metric .label{font-size:12px;color:#999}
#sidebar .metric .val{font-size:18px;font-weight:bold;color:var(--accent)}
#sidebar .ach{font-size:12px;padding:4px 8px;background:#0E1117;border-radius:4px;color:var(--green)}
#sidebar .ach::before{content:'✓ '}
#sidebar button{padding:10px;border:none;border-radius:var(--radius);cursor:pointer;font-size:14px}
.btn-accent{background:var(--accent);color:#000;font-weight:bold;width:100%}
.btn-reset{background:#333;color:var(--text);width:100%}
#sidebar button:hover{opacity:0.8}

/* 主内容 */
#main{flex:1;padding:24px;overflow-y:auto;max-height:100vh}
#main h2{font-size:24px;margin-bottom:4px}
#main .subtitle{color:#999;margin-bottom:16px}
.section{display:none}
.section.active{display:block}

/* 通用 */
.row{display:flex;gap:16px;flex-wrap:wrap}
.card{background:var(--bg2);padding:16px;border-radius:var(--radius)}
.col2{flex:1;min-width:280px}
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid #333}
.tabs label{padding:8px 16px;cursor:pointer;color:#999;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tabs input[type=radio]{display:none}
.tabs input:checked+label{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}
.metric-box{padding:12px;background:#0E1117;border-radius:var(--radius);text-align:center}
.metric-box .num{font-size:24px;font-weight:bold;color:var(--accent)}
.metric-box .lbl{font-size:12px;color:#999;margin-top:4px}
.btn{padding:10px 20px;border:none;border-radius:var(--radius);cursor:pointer;font-size:14px}
.btn.accent{background:var(--accent);color:#000;font-weight:bold}
.btn.red{background:var(--red);color:#fff}
.btn.outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
button:disabled{opacity:0.4;cursor:not-allowed}
img{max-width:100%;border-radius:var(--radius)}
progress{height:8px;border-radius:4px}
progress::-webkit-progress-bar{background:#333;border-radius:4px}
progress::-webkit-progress-value{background:var(--accent);border-radius:4px}
.chk{width:20px;height:20px}

/* 关卡3决策 */
.decision{background:#1a1a2e;border-left:3px solid var(--accent);padding:12px 16px;margin:8px 0;border-radius:0 var(--radius) var(--radius) 0}

/* 移动端 */
@media(max-width:768px){
  body{flex-direction:column}
  #sidebar{width:100%;flex-direction:row;flex-wrap:wrap;gap:8px;padding:10px}
  #sidebar h1{font-size:16px;width:100%}
  #main{padding:12px}
  .row{flex-direction:column}
  .col2{min-width:auto}
}
</style>
</head>
<body>

<!-- 侧边栏 -->
<div id="sidebar">
  <h1>🧠 AI训练师</h1>
  <div class="stage" id="side-stage">关卡1: 数据猎人</div>
  <progress id="side-progress" value="0" max="100"></progress>
  <div class="metric"><div class="label">总分</div><div class="val" id="side-score">0</div></div>
  <div class="metric"><div class="label">模型准确率</div><div class="val" id="side-acc">未训练</div></div>
  <div id="side-achieve"></div>
  <div id="side-dev" style="font-size:12px">
    <select id="dev-jump" style="width:100%;padding:4px;background:#333;color:var(--text);border:none;border-radius:4px">
      <option value="0">🔧 开发者跳转</option>
      <option value="1">关卡1: 数据猎人</option>
      <option value="2">关卡2: 架构师</option>
      <option value="3">关卡3: 训练大师</option>
      <option value="4">关卡4: 诊断专家</option>
      <option value="5">关卡5: 临床实战</option>
    </select>
  </div>
  <button class="btn-reset" onclick="resetGame()">🔄 重新开始</button>
</div>

<!-- 主内容 -->
<div id="main">
  <section class="section active" id="s1"></section>
  <section class="section" id="s2"></section>
  <section class="section" id="s3"></section>
  <section class="section" id="s4"></section>
  <section class="section" id="s5"></section>
</div>

<script>
// ==================== 全局状态 ====================
let GS={stage:1,score:0,achievements:[],modelAccuracy:0,chosenArch:null,hyperparams:{},
  // Stage1
  s1tab1:false,s1tab2:false,s1tab3:false,
  s1answers:[],s1revealed:false,
  // Stage3
  s3phase:'intro',s3decisions:{},s3watched:0,
  // Stage4
  s4idx:0,s4done:[],
  // Stage5
  s5queue:[],s5current:0,s5answers:{},s5finished:false
};
const stageNames={1:'数据猎人',2:'架构师',3:'训练大师',4:'诊断专家',5:'临床实战'};
const archInfo={resnet18:{params:'11M',time:'~2分/轮(CPU)',mem:'~0.5GB',upgrade:3},'3dcnn':{params:'5M',time:'~8分/轮(CPU)',mem:'~2GB',upgrade:6}};

// 从 URL 恢复状态（可选）
try{ const s=localStorage.getItem('gameState'); if(s) GS=Object.assign(GS,JSON.parse(s)); }catch(e){}
function saveState(){ try{ localStorage.setItem('gameState',JSON.stringify(GS)); }catch(e){} }

// ==================== 渲染侧边栏 ====================
function renderSidebar(){
  const stage=GS.stage;
  document.getElementById('side-stage').textContent=`关卡${stage}: ${stageNames[stage]}`;
  document.getElementById('side-progress').value=(stage-1)*25;
  document.getElementById('side-score').textContent=GS.score;
  document.getElementById('side-acc').textContent=GS.modelAccuracy? (GS.modelAccuracy*100).toFixed(1)+'%' : '未训练';
  const achDiv=document.getElementById('side-achieve');
  if(GS.achievements.length){
    achDiv.innerHTML=GS.achievements.map(a=>`<div class="ach">${a}</div>`).join('');
  }else{
    achDiv.innerHTML='';
  }
  saveState();
}

// ==================== 页面切换 ====================
function showStage(n){
  GS.stage=n; saveState();
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  renderSidebar();
  if(n===1) renderStage1();
  else if(n===2) renderStage2();
  else if(n===3){ GS.s3phase='intro'; renderStage3(); }
  else if(n===4){ GS.s4idx=0; GS.s4done=[]; renderStage4(); }
  else if(n===5){ GS.s5queue=[]; GS.s5current=0; GS.s5answers={}; GS.s5finished=false; renderStage5(); }
}
function resetGame(){
  localStorage.removeItem('gameState');
  location.reload();
}
document.getElementById('dev-jump').addEventListener('change',function(){
  const v=parseInt(this.value);
  if(v>0){ this.value=0; showStage(v); }
});

// ==================== 数据加载 ====================
let caseList=[], trainingHistory=null;
async function loadData(){
  try{
    const r=await fetch('loss_fig/training_history.json');
    trainingHistory=await r.json();
  }catch(e){ trainingHistory=_genDemoHistory(); }
  // 病例列表
  for(let i=1;i<=6;i++){
    const dir=`cases/case_${String(i).padStart(3,'0')}`;
    try{
      const r=await fetch(`${dir}/label.json`);
      const meta=await r.json();
      caseList.push({id:dir,image:`${dir}/image.png`,meta,thumbDir:`${dir}/slices/thumb/`,sliceCount:meta.slice_count||0});
    }catch(e){}
  }
}
function _genDemoHistory(){
  const epochs=[],tl=[],vl=[],ta=[],va=[];
  for(let e=1;e<=50;e++){
    epochs.push(e);
    tl.push(0.85*Math.exp(-0.08*e)+0.05*Math.random()+0.1);
    vl.push(0.82*Math.exp(-0.06*e)+0.08*Math.random()+0.15);
    ta.push(Math.min(0.95,0.3+0.6*(1-Math.exp(-0.06*e))+0.03*Math.random()));
    va.push(Math.min(0.85,0.25+0.5*(1-Math.exp(-0.04*e))+0.05*Math.random()));
  }
  return {epochs,train_loss:tl,val_loss:vl,train_acc:ta,val_acc:va};
}

// ==================== 关卡绘制工具 ====================
function drawCurves(history,highlightEpoch,ctxW,ctxH){
  const canvas=document.createElement('canvas'); canvas.width=ctxW; canvas.height=ctxH;
  const ctx=canvas.getContext('2d'), W=ctxW/2, H=ctxH;
  const end=Math.min(highlightEpoch||50, history.epochs.length);
  const epochs=history.epochs.slice(0,end);
  const pad=40, chartW=(W-pad*2), chartH=H-pad*2;
  // Loss 图
  ctx.strokeStyle='#666'; ctx.beginPath(); ctx.moveTo(pad,pad); ctx.lineTo(pad,H-pad); ctx.lineTo(W-pad,H-pad); ctx.stroke();
  drawLine(ctx,epochs,history.train_loss.slice(0,end),'#4ECDC4',pad,chartW,chartH,H);
  drawLine(ctx,epochs,history.val_loss.slice(0,end),'#FF6B6B',pad,chartW,chartH,H);
  if(highlightEpoch) drawVLine(ctx,highlightEpoch,'#FFA500',pad,chartW,chartH,H,end);
  ctx.fillStyle='#E0E0E0'; ctx.font='12px sans-serif';
  ctx.fillText('Loss 曲线',pad+10,pad+16);
  // Acc 图
  const apad=W+pad;
  ctx.strokeStyle='#666'; ctx.beginPath(); ctx.moveTo(apad,pad); ctx.lineTo(apad,H-pad); ctx.lineTo(W+W-pad,H-pad); ctx.stroke();
  drawLine(ctx,epochs,history.train_acc.slice(0,end).map(a=>a*100),'#4ECDC4',apad,chartW,chartH,H,0,100);
  drawLine(ctx,epochs,history.val_acc.slice(0,end).map(a=>a*100),'#FF6B6B',apad,chartW,chartH,H,0,100);
  if(highlightEpoch) drawVLine(ctx,highlightEpoch,'#FFA500',apad,chartW,chartH,H,end);
  ctx.fillStyle='#E0E0E0';
  ctx.fillText('Accuracy 曲线',apad+10,pad+16);
  ctx.fillStyle='#999'; ctx.font='10px sans-serif';
  ctx.fillText('蓝=训练 红=验证',pad+10,pad+30);
  ctx.fillText('蓝=训练 红=验证',apad+10,pad+30);
  return canvas;
}
function drawLine(ctx,epochs,values,color,x0,cw,ch,chH,yMin,yMax){
  if(!yMin){ yMin=Math.min(...values); yMax=Math.max(...values); }
  const range=yMax-yMin||1;
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath();
  epochs.forEach((e,i)=>{
    const x=x0+(e/epochs[epochs.length-1])*cw;
    const y=chH-ch/2-((values[i]-yMin)/range)*ch;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();
}
function drawVLine(ctx,epoch,color,x0,cw,ch,chH,maxEpoch){
  const x=x0+(epoch/maxEpoch)*cw;
  ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.setLineDash([4,4]); ctx.beginPath();
  ctx.moveTo(x,chH-ch/2); ctx.lineTo(x,chH-ch/2-ch); ctx.stroke(); ctx.setLineDash([]);
}

// ==================== 关卡1: 数据猎人 ====================
function renderStage1(){
  const s=document.getElementById('s1');
  s.innerHTML=`
    <h2>🔍 关卡1: 数据猎人</h2><p class="subtitle">目标：理解CT影像数据，收集并准备训练样本</p>
    <div class="tabs" id="s1-tabs">
      <input type="radio" name="s1tab" id="s1t1" onchange="switchTab1(0)" ${GS.s1tab1?'':'checked'}>
      <label for="s1t1">📖 认识CT数据</label>
      <input type="radio" name="s1tab" id="s1t2" onchange="switchTab1(1)">
      <label for="s1t2">🎚️ 肺窗调节实验</label>
      <input type="radio" name="s1tab" id="s1t3" onchange="switchTab1(2)">
      <label for="s1t3">🏷️ 标注训练数据</label>
    </div>
    <div id="s1tc0" class="tab-content active">${tab1Content()}</div>
    <div id="s1tc1" class="tab-content">${tab2Content()}</div>
    <div id="s1tc2" class="tab-content">${tab3Content()}</div>
    <hr>
    <div id="s1-progress" style="margin-top:16px">
      ${renderS1Progress()}
    </div>
  `;
  if(GS.s1tab2) initLungCanvas();
}

function switchTab1(n){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('s1tc'+n).classList.add('active');
  if(!GS.s1tab1 && n===0) GS.s1tab1=true;
  if(n===1) setTimeout(initLungCanvas,100);
  renderSidebar(); refreshS1Progress();
}

function tab1Content(){
  let html=`
    <div class="card" style="margin-bottom:16px">
      <h3>CT是什么？</h3>
      <p><b>CT (Computed Tomography)</b> 是X射线从不同角度扫描人体后重建的断面图像。可以理解为"将人体切成很多薄片，然后一张张拍照"。</p>
    </div>
    <div class="row">
      <div class="col2 card"><h4>CT值 (HU)</h4>
        <table style="width:100%;margin-top:8px">
          <tr><td>空气</td><td>≈ -1000</td></tr><tr><td>肺组织</td><td>≈ -700 ~ -800</td></tr>
          <tr><td>脂肪</td><td>≈ -100 ~ -50</td></tr><tr><td>水</td><td>0</td></tr>
          <tr><td>软组织</td><td>+20 ~ +50</td></tr><tr><td>骨骼</td><td>+400 ~ +1000</td></tr>
        </table>
      </div>
      <div class="col2 card"><p>💡 <b>关键洞察</b><br>肺部CT中，肺组织HU值很低(≈-800)而结节是软组织(≈+20~+50)。这种密度差异正是AI识别结节的基础!</p></div>
    </div>
  `;
  // 切片浏览器
  if(caseList.length>0){
    const c=caseList[0];
    html+=`<div class="card" style="margin-top:16px"><h4>3D体积切片浏览</h4><p>CT数据是3D体积(一堆切片堆叠)。拖动滑块浏览不同层面:</p>
      <div style="text-align:center"><input type="range" id="s1-slice-range" min="0" max="${c.sliceCount-1}" value="${Math.floor(c.sliceCount/2)}" oninput="updateSlice(this.value)" style="width:100%">
      <img id="s1-slice-img" src="" style="max-width:350px;margin-top:8px" alt="切片">
      <div id="s1-slice-caption" style="font-size:13px;color:#999"></div></div></div>`;
  }
  return html;
}

function updateSlice(idx){ window._sliceIdx=idx; refreshSlice(); }
function refreshSlice(){
  if(caseList.length===0) return;
  const c=caseList[0], idx=window._sliceIdx||0;
  document.getElementById('s1-slice-img').src=`${c.thumbDir}1-${String(idx+1).padStart(3,'0')}.png`;
  document.getElementById('s1-slice-caption').textContent=`切片 #${idx+1}/${c.sliceCount}`;
  GS.s1tab1=true; renderSidebar(); refreshS1Progress();
}

function tab2Content(){
  return `<div class="row">
    <div class="col2 card"><h4>肺窗调节实验</h4><p>原始CT的HU范围很宽(-1000~+1000)，人眼只能分辨有限灰阶。<b>窗技术</b>通过设置窗宽(WW)和窗位(WC)来突出观察目标。</p>
      <div style="display:flex;gap:8px;margin:8px 0"><button class="btn outline" onclick="setPreset(-600,1500)">肺窗</button><button class="btn outline" onclick="setPreset(50,350)">纵隔窗</button><button class="btn outline" onclick="setPreset(400,1800)">骨窗</button></div>
      <div style="display:flex;gap:8px"><div style="flex:1"><label>窗位 WC: <span id="s1-wc-val">-600</span></label><input type="range" id="s1-wc" min="-1000" max="500" value="-600" oninput="updateLungWin()"></div>
      <div style="flex:1"><label>窗宽 WW: <span id="s1-ww-val">1500</span></label><input type="range" id="s1-ww" min="100" max="3000" value="1500" oninput="updateLungWin()"></div></div></div>
    <div class="col2"><canvas id="s1-lung-canvas" width="256" height="256"></canvas></div>
  </div>
  <div id="s1-lung-hint" style="margin-top:8px;padding:8px;background:var(--bg2);border-radius:var(--radius);font-size:14px;color:#aaa">💡 尝试 WC=-600, WW=1500（临床标准肺窗）</div>`;
}

function setPreset(wc,ww){
  document.getElementById('s1-wc').value=wc; document.getElementById('s1-ww').value=ww;
  updateLungWin();
}
function updateLungWin(){
  const wc=parseInt(document.getElementById('s1-wc').value);
  const ww=parseInt(document.getElementById('s1-ww').value);
  document.getElementById('s1-wc-val').textContent=wc;
  document.getElementById('s1-ww-val').textContent=ww;
  GS.s1tab2=true; renderSidebar(); refreshS1Progress();
  // Canvas 肺部窗处理
  const canvas=document.getElementById('s1-lung-canvas');
  if(!canvas||!canvas._imgData) return;
  const ctx=canvas.getContext('2d');
  const imgData=ctx.createImageData(256,256);
  const data=canvas._imgData, out=imgData.data;
  const low=wc-ww/2, high=wc+ww/2, range=high-low;
  for(let i=0;i<data.length;i+=4){
    const hu=(data[i]/255)*2000-1000;
    const pixel=Math.round(((hu-low)/range)*255);
    const v=Math.max(0,Math.min(255,pixel));
    out[i]=out[i+1]=out[i+2]=v; out[i+3]=255;
  }
  ctx.putImageData(imgData,0,0);
  // 提示
  const hint=document.getElementById('s1-lung-hint');
  if(Math.abs(wc+600)<=50 && Math.abs(ww-1500)<=100){
    hint.innerHTML='✅ 肺窗大师! WC≈-600, WW≈1500 是观察肺实质的最佳设置(+15分)';
    hint.style.color=GS.score>0?'':'var(--green)';
  }else{ hint.innerHTML='💡 尝试 WC=-600, WW=1500（临床标准肺窗）'; hint.style.color='#aaa'; }
}
function initLungCanvas(){
  const canvas=document.getElementById('s1-lung-canvas');
  if(!canvas) return;
  // 用病例图作为demo
  const img=new Image();
  img.onload=function(){
    const ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0,256,256);
    canvas._imgData=ctx.getImageData(0,0,256,256).data;
    updateLungWin();
  };
  if(caseList.length>0) img.src=caseList[0].image;
  else{ img.src=''; setTimeout(initLungCanvas,500); }
}

// 标注训练数据（Tab 3）
function tab3Content(){
  if(caseList.length===0) return '<div class="card">病例库为空。请运行 build_case_library.py。</div>';
  let html='<div class="card"><h4>标记训练数据</h4><p>扮演数据标注员，判断以下CT切片中是否含有肺结节。</p></div>';
  const samples=caseList.slice(0,4).concat(caseList.slice(4,6)); // 病灶+正常，固定顺序
  window._s1samples=samples;
  html+=samples.map((c,i)=>`
    <div class="card" style="margin:8px 0">
      <b>样本 ${i+1}: ${c.meta.title||c.id}</b>
      <div class="row" style="margin-top:8px">
        <div class="col2"><img src="${c.image}" style="max-width:250px"></div>
        <div class="col2">
          ${!GS.s1revealed ? `
            <div style="margin:8px 0"><label><input type="radio" name="s1label${i}" value="Lesion"> 有结节 (Lesion)</label></div>
            <div style="margin:8px 0"><label><input type="radio" name="s1label${i}" value="Normal"> 无结节 (Normal)</label></div>
            <button class="btn accent" onclick="submitLabel(${i})">确认 ${i+1}</button>
          ` : renderLabelResult(i,samples[i])}
        </div>
      </div>
    </div>
  `).join('');
  if(GS.s1revealed) html+=renderLabelSummary(samples);
  return html;
}

function submitLabel(i){
  const radios=document.getElementsByName('s1label'+i);
  let val=null; radios.forEach(r=>{ if(r.checked) val=r.value; });
  if(!val) return;
  GS.s1answers[i]=val;
  if(GS.s1answers.filter(a=>a!==undefined).length>=6) GS.s1revealed=true;
  GS.s1tab3=true; renderSidebar(); renderStage1(); refreshS1Progress();
}

function renderLabelResult(i,sample){
  const user=GS.s1answers[i]||'未作答', correct=sample.meta.class||'Lesion', ok=user===correct;
  const mk=sample.meta.medical_knowledge||{};
  let html=`<b>你的判断:</b> ${user}<br><b>真实标签:</b> ${correct}<br>${ok?'✅ 正确':'❌ 有偏差'}`;
  if(!ok) html+='<br><small>提示: 正常血管断面和钙化点易与结节混淆</small>';
  if(mk.imaging_features) html+=`<br><small><b>影像特征:</b> ${mk.imaging_features.join(', ')}</small>`;
  return html;
}

function renderLabelSummary(samples){

function nextPhase(){

  renderStage3();
}

function submitDecision(key,correctVal){
  const v=GS.s3decisions[key];
  if(v===undefined) return;
  if(v===correctVal) GS.score+=20;
  renderStage3();
}

  const correctD=Object.values(GS.s3decisions).filter(v=>v===0||v===1||v===0).length;
  GS.modelAccuracy=0.82+correctD*0.03; if(GS.modelAccuracy>0.92) GS.modelAccuracy=0.92;
  GS.score+=correctD*5;
  GS.s3phase='final';
  const s=document.getElementById('s3');
  const hist=trainingHistory||_genDemoHistory();
  s.innerHTML=`

  const totalTraps=GS.s5queue.filter(q=>q.aiTrap).length;
  const grade=correct/total>=0.8?'S':correct/total>=0.6?'A':'B';
  GS.score+=Math.round((correct/total)*100);
  document.getElementById('s5').innerHTML=`
    <h2>📊 最终结算</h2>
    <div class="row"><div class="metric-box col2"><div class="num">${(correct/total*100).toFixed(0)}%</div><div class="lbl">筛查准确率</div></div>
    <div class="metric-box col2"><div class="num">${trapsFound}/${totalTraps}</div><div class="lbl">发现AI陷阱</div></div></div>
    <div class="card" style="margin-top:16px;text-align:center"><h1 style="font-size:48px;color:var(--accent)">${grade}</h1><p>总评级</p></div>
    <div class="card" style="margin-top:8px"><h4>🏆 本次训练总结</h4><p>总得分: <b>${GS.score}</b> | 模型准确率: <b>${(GS.modelAccuracy*100).toFixed(1)}%</b> | 解锁成就: <b>${GS.achievements.length}</b>个</p>
      <p style="color:#999">你体验了一个完整的AI开发流程：数据准备→模型搭建→训练调参→诊断评估→临床实战。AI不是万能的，关键是与人类专业判断互补配合。</p>
    </div>
    <button class="btn accent" style="margin-top:16px" onclick="resetGame()">🔄 重新挑战</button>
  `;
  renderSidebar(); saveState();
}

// 初始加载
loadData().then(()=>{
  renderSidebar();
  if(GS.stage===1) renderStage1();
  else showStage(GS.stage);
  if(caseList.length>0) setTimeout(refreshSlice,200);
  setTimeout(initLungCanvas,500);
});
</script>
</body>
</html>
