name: Keep Streamlit Alive
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: browser-actions/setup-chrome@v1
      - run: |
          google-chrome --headless --disable-gpu --no-sandbox \
            --virtual-time-budget=30000 --timeout=60000 --dump-dom \
            "https://zhiyingsuyuan.streamlit.app" > /dev/null 2>&1
          echo "Keepalive done"
